baseURL = "https://wikimarion.org/"
languageCode = "en-us"
title = "WikiMarion"
theme = "wikimarion"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "A history of Marion, Indiana and surrounding areas"
  substackURL = "https://billmunn.substack.com"
  substackFeed = "https://billmunn.substack.com/feed"
  mapsCenter = [40.5584, -85.6591]
  mapsZoom = 13
  # Article slugs shown in the homepage "From the Collection" section.
  # Each should have a first_image. Edit this list to curate the front page;
  # if empty or invalid, the homepage falls back to articles that have images.
  featured = [
    "grant-county-courthouse",
    "veterans-administration-medical-center",
    "matter-park",
    "quilters-hall-of-fame",
  ]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # allow HTML in markdown

[taxonomies]
  category = "categories"

[[menus.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menus.main]]
  name = "All Articles"
  url = "/articles/"
  weight = 2

[[menus.main]]
  name = "Map"
  url = "/map/"
  weight = 3

[[menus.main]]
  name = "Categories"
  url = "/categories/"
  weight = 4

[[menus.main]]
  name = "From the Historian"
  url = "/historian/"
  weight = 5

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 6
